name: Daily GK Nifty Heads Data Sync

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  sync-and-calculate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then
            npm install --production
          fi

      - name: Run Delta Sync + Rarity Calculation
        run: |
          node scripts/delta-sync.js
          node scripts/calculate-rarity.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ leaderboard.json manifest.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): daily sync and rarity recalculation [$(date +%Y-%m-%d)]"
            git push
          fi
